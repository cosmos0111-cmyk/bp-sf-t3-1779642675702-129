<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="630" viewBox="0 0 1200 630">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0d2137"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
    <linearGradient id="accentGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#00bcd4"/>
      <stop offset="100%" stop-color="#0a1628"/>
    </linearGradient>
  </defs>

  <!-- 배경 -->
  <rect width="1200" height="630" fill="url(#bg)"/>

  <!-- Geometric pattern -->
  <circle cx="265" cy="305" r="78" fill="#0a1628" opacity="0.18"/>
    <circle cx="864" cy="674" r="33" fill="#0a1628" opacity="0.18"/>
    <circle cx="612" cy="328" r="92" fill="#0a1628" opacity="0.09"/>
    <circle cx="476" cy="68" r="77" fill="#0a1628" opacity="0.16"/>
    <circle cx="141" cy="688" r="27" fill="#0a1628" opacity="0.11"/>
    <circle cx="164" cy="22" r="43" fill="#0a1628" opacity="0.14"/>
    <rect x="1272" y="370" width="38" height="84" rx="8" fill="#0d2137" opacity="0.13" transform="rotate(5, 691, 233)"/>
    <rect x="1025" y="464" width="23" height="31" rx="8" fill="#0d2137" opacity="0.03" transform="rotate(19, 1017, -26)"/>
    <rect x="-89" y="659" width="85" height="31" rx="8" fill="#0d2137" opacity="0.03" transform="rotate(20, 429, 240)"/>
    <rect x="376" y="589" width="72" height="58" rx="8" fill="#0d2137" opacity="0.07" transform="rotate(14, 408, 214)"/>
    <rect x="195" y="128" width="56" height="59" rx="8" fill="#0d2137" opacity="0.12" transform="rotate(5, 717, 286)"/>
    <rect x="420" y="549" width="25" height="49" rx="8" fill="#0d2137" opacity="0.04" transform="rotate(26, 648, 233)"/>
    <rect x="1137" y="528" width="86" height="23" rx="8" fill="#0d2137" opacity="0.06" transform="rotate(7, 883, 367)"/>
    <rect x="-36" y="654" width="35" height="55" rx="8" fill="#0d2137" opacity="0.05" transform="rotate(2, 953, 92)"/>
    <polygon points="651,535 694,621 608,621" fill="#0a1628" opacity="0.12"/>
    <polygon points="1055,215 1107,319 1003,319" fill="#0a1628" opacity="0.09"/>
    <polygon points="734,635 775,717 693,717" fill="#0a1628" opacity="0.12"/>
    <polygon points="-47,469 19,601 -113,601" fill="#0a1628" opacity="0.04"/>

  <!-- Wave at bottom -->
  <path d="M0,562 C360,596 840,528 1200,562 L1200,630 L0,630Z" fill="#0a1628" opacity="0.3"/>

  <!-- 중앙 텍스트 카드 -->
  <rect x="80" y="195" width="1040" height="260" rx="20" fill="rgba(0,0,0,0.35)" filter="url(#blur-bg)"/>
  <filter id="blur-bg"><feGaussianBlur stdDeviation="8"/></filter>

  <text x="600" y="270" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="44" font-weight="700" fill="#ffffff" letter-spacing="2">
    구글 상위노출 대행
  </text>
  <text x="600" y="330" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="22" font-weight="400" fill="rgba(255,255,255,0.85)">
    마포 — LLM비교
  </text>

  <!-- Accent line -->
  <line x1="450" y1="355" x2="750" y2="355" stroke="#00bcd4" stroke-width="3" stroke-linecap="round" opacity="0.8"/>

  <!-- 하단 CTA -->
  <rect x="440" y="385" width="320" height="40" rx="20" fill="#00bcd4" opacity="0.9"/>
  <text x="600" y="411" text-anchor="middle" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="16" font-weight="600" fill="#ffffff">
    ▼ 자세히 보기
  </text>

  <!-- 상단 브랜드 -->
  <text x="60" y="55" font-family="'Noto Sans JP','Noto Sans KR','Pretendard',sans-serif" font-size="18" font-weight="600" fill="rgba(255,255,255,0.6)">
    마포 구글 상위노출 대행 — LLM비교
  </text>
</svg>